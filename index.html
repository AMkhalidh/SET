<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SET – For Beginners</title>

  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splashContent">
    <div class="splashCards">
      <div class="splashCard">S</div>
      <div class="splashCard">E</div>
      <div class="splashCard">T</div>
    </div>
    <div class="splashSubtitle">for beginners</div>
    <button class="splashBtn" id="enterGame">Start Game</button>
  </div>
</div>

<div class="app">

  <div class="header">
    <h1 class="title">SET</h1>
    <div class="headerRight">
      <button class="ghost" id="btnTutorial">Tutorial</button>
      <button class="danger" id="btnEnd">End Game</button>
    </div>
  </div>

  <div class="panel">

    <div class="topbar">
      <div class="stat"><div class="label">Time</div><div class="value" id="time">00:00</div></div>
      <div class="stat"><div class="label">Sets Found</div><div class="value" id="score">0</div></div>
      <div class="stat"><div class="label">Cards Left</div><div class="value" id="cardsLeft">27</div></div>
      <div class="stat">
        <div class="label">Controls</div>
        <button class="primary" id="btnNew">Start New Game</button>
        <button id="btnHint">Hint</button>
      </div>
    </div>

    <div class="message" id="msg">
      Welcome! Click <strong>Start New Game</strong> to begin.
    </div>

    <div class="grid" id="grid"></div>

  </div>
</div>

<!-- TUTORIAL MODAL -->
<div class="overlay" id="overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="tutorialTitle">
    <div class="modalHeader">
      <h2 id="tutorialTitle">Tutorial</h2>
      <button class="ghost" id="btnCloseTutorial" aria-label="Close tutorial">✖</button>
    </div>

    <div class="modalBody" id="slide"></div>

    <div class="modalNav">
      <button class="ghost" id="prev">◀ Back</button>
      <button class="primary" id="next">Next ▶</button>
    </div>
  </div>
</div>

</body>
</html>
