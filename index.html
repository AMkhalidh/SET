<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SET — Beginner Edition</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="splash">
  <div class="splash-logo">
    <div class="splash-letter">S</div>
    <div class="splash-letter">E</div>
    <div class="splash-letter">T</div>
  </div>
  <div class="splash-sub">Beginner Edition &mdash; 27 Cards</div>
  <button class="splash-btn" id="enterGame">&#9654;&nbsp;&nbsp;Play</button>
</div>

<div class="score-popup" id="scorePopup">&#127881; SET!</div>

<div class="gameover-overlay" id="gameoverOverlay">
  <div class="gameover-modal">
    <div class="gameover-title">FINISHED</div>
    <div class="gameover-rating" id="goRating">&#128077; Good</div>
    <div class="gameover-stats">
      <div class="gameover-stat">
        <span class="gameover-stat-val" id="goScore">0</span>
        <span class="gameover-stat-label">Sets</span>
      </div>
      <div class="gameover-stat">
        <span class="gameover-stat-val" id="goTime">00:00</span>
        <span class="gameover-stat-label">Time</span>
      </div>
      <div class="gameover-stat">
        <span class="gameover-stat-val" id="goStreak">0</span>
        <span class="gameover-stat-label">Streak</span>
      </div>
    </div>
    <div class="gameover-best" id="goBest"></div>
    <button class="btn primary" id="goPlayAgain" style="width:100%;padding:13px;font-size:14px;border-radius:12px;letter-spacing:1px">PLAY AGAIN</button>
  </div>
</div>

<div class="app">

  <div class="header">
    <div class="header-logo-row">
      <div class="logo">SET</div>
    </div>
    <div class="header-subrow">
      <div class="header-stats">
        <div class="hstat">
          <div class="hstat-label">Time</div>
          <div class="hstat-value" id="time">00:00</div>
        </div>
        <div class="hstat">
          <div class="hstat-label">Sets Found</div>
          <div class="hstat-value" id="score">0</div>
        </div>
        <div class="hstat">
          <div class="hstat-label">Cards Left</div>
          <div class="hstat-value" id="cardsLeft">27</div>
        </div>
        <div class="hstat hstat-streak">
          <div class="hstat-label">&#128293; Streak</div>
          <div class="hstat-value" id="streak">0</div>
        </div>
        <div class="hstat">
          <div class="hstat-label">SETs on Board</div>
          <div class="hstat-value" id="setsLeft">&ndash;</div>
        </div>
      </div>
      <div class="header-btns">
        <button class="btn primary" id="btnNew">New</button>
        <button class="btn" id="btnHint">Hint <span class="kbd">H</span></button>
        <button class="btn" id="btnTutorial">&#128218;</button>
        <button class="btn danger" id="btnEnd">&#10005;</button>
      </div>
    </div>
  </div>

  <div class="message-bar">
    <div id="msg">Hit <strong>New</strong> to start a game.</div>
    <div class="chips">
      <span class="chip">Pick 3 cards</span>
      <span class="chip">All same or all different</span>
    </div>
  </div>

  <div class="grid" id="grid"></div>

</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-top">
      <div class="tutorial-step" id="tutStep">TUTORIAL (1/4)</div>
      <button class="modal-close" id="btnCloseTutorial">&#10005;</button>
    </div>
    <div class="modal-body" id="slideContent"></div>
    <div class="modal-dots" id="dots"></div>
    <div class="modal-nav">
      <button class="btn btn-back" id="prev">&#9664; Back</button>
      <button class="btn btn-next" id="next">Next &#9654;</button>
    </div>
    <div style="text-align:center;padding:0 26px 20px">
      <button id="btnSkipTutorial" style="background:none;border:none;color:rgba(240,240,245,0.25);font-size:12px;font-weight:600;cursor:pointer;text-decoration:underline;font-family:inherit;letter-spacing:0.3px">Skip tutorial</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
